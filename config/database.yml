# SQLite. Versions 3.8.0 and up are supported.
# gem install sqlite3
default: &default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *default
  database: storage/development.sqlite3

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or .
test:
  <<: *default
  database: storage/test.sqlite3
# Store  database in the storage/ directory, which by default
production:
  primary: &primary_production
    adapter: postgresql
    url: <%= ENV['DATABASE_URL'] %>
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  cache:
    <<: *primary_production
  queue:
    <<: *primary_production
  cable:
    <<: *primary_production
# is mounted as a persistent Docker volume in config/deploy.yml.
database:
  primary:
    <<: *default
    database: storage/.sqlite3
  cache:
    <<: *default
    database: storage/_cache.sqlite3
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: storage/_queue.sqlite3
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: storage/_cable.sqlite3
    migrations_paths: db/cable_migrate
